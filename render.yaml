# Render Blueprint for Hermes Agent
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploying, set the required environment variables in the Render dashboard.
# Required env vars (set via Render dashboard -> Environment):
#   - OPENAI_API_KEY or equivalent LLM provider key
#   - TELEGRAM_BOT_TOKEN      (if using Telegram gateway)
#   - DISCORD_BOT_TOKEN       (if using Discord gateway)
#   - API_SERVER_KEY          (if exposing the API server beyond localhost)
#
# Note: Hermes Agent is primarily a CLI/gateway tool, not a traditional web app.
# This blueprint deploys the dashboard and the messaging gateway.
# The dashboard exposes a built-in API; there is no separate "api-server" command.

services:
  # ---------------------------------------------------------------------------
  # Web Dashboard (also serves the built-in REST API)
  # ---------------------------------------------------------------------------
  - type: web
    name: hermes-dashboard
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # The Dockerfile ENTRYPOINT runs entrypoint.sh which sources the venv and
    # drops privileges; then "hermes" is on PATH.  --insecure is required
    # because Render assigns a non-localhost host/port.  --skip-build skips
    # the npm build step because the Dockerfile already built the web assets.
    startCommand: >
      hermes dashboard --host 0.0.0.0 --port $PORT --no-open --insecure --skip-build
    envVars:
      - key: HERMES_UID
        value: "10000"
      - key: HERMES_GID
        value: "10000"
      - key: HERMES_WEB_DIST
        value: /opt/hermes/hermes_cli/web_dist
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /
    autoDeploy: false

  # ---------------------------------------------------------------------------
  # Gateway Worker (Telegram, Discord, Slack, WhatsApp, etc.)
  # ---------------------------------------------------------------------------
  - type: worker
    name: hermes-gateway
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: hermes gateway run
    envVars:
      - key: HERMES_UID
        value: "10000"
      - key: HERMES_GID
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: false
